<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>PicoPDU</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0f1117; color: #cdd6f4;
  height: 100vh; display: flex; flex-direction: column;
}

/* top bar */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 10px 24px;
  background: #1e1e2e; border-bottom: 1px solid #313244;
}
.topbar h1 { font-size: 18px; font-weight: 600; color: #89b4fa; letter-spacing: .5px; }
.topbar .sub { font-size: 13px; color: #585b70; margin-left: auto; }
#dot { width: 9px; height: 9px; border-radius: 50%; background: #a6e3a1; flex-shrink: 0; }
/* login */
#loginBar { display: flex; align-items: center; gap: 8px; }
#loginBar input {
  padding: 5px 10px; background: #313244; color: #cdd6f4;
  border: 1px solid #45475a; border-radius: 4px; font-size: 13px; width: 140px;
}
#loginBar button {
  padding: 5px 14px; background: #89b4fa; color: #1e1e2e;
  border: none; border-radius: 4px; font-size: 13px; cursor: pointer; font-weight: 600;
}
#loginBar button:hover { background: #b4d0fa; }
#loginErr { font-size: 12px; color: #f38ba8; }
#loggedAs { font-size: 12px; color: #a6e3a1; display: flex; align-items: center; gap: 8px; }
#logoutBtn {
  padding: 4px 10px; background: transparent; color: #585b70;
  border: 1px solid #45475a; border-radius: 4px; font-size: 12px; cursor: pointer;
}
#logoutBtn:hover { color: #f38ba8; border-color: #f38ba8; }
.locked { opacity: .35; pointer-events: none; }

/* main area */
.main { flex: 1; padding: 24px 32px; overflow: auto; }

/* sensor bar */
.sensors { display: flex; gap: 12px; max-width: 900px; margin-bottom: 16px; }
.scard {
  background: #1e1e2e; border: 1px solid #313244; border-radius: 8px;
  padding: 12px 20px; display: flex; align-items: center; gap: 14px; min-width: 180px;
}
.scard .ico { font-size: 24px; line-height: 1; }
.slabel { font-size: 11px; color: #585b70; text-transform: uppercase; letter-spacing: .8px; }
.sval { font-size: 24px; font-weight: 700; color: #cdd6f4; font-variant-numeric: tabular-nums; }

/* channel grid */
.grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; max-width: 900px;
}
.card {
  background: #1e1e2e; border: 1px solid #313244; border-radius: 8px;
  padding: 16px 20px; display: flex; flex-direction: column; gap: 10px;
}
.card .label { font-size: 12px; color: #585b70; text-transform: uppercase; letter-spacing: .8px; }
.card .chnum { font-size: 22px; font-weight: 700; color: #89b4fa; }
.badge {
  display: inline-block; padding: 4px 14px; border-radius: 4px;
  font-size: 13px; font-weight: 600; letter-spacing: .5px; width: fit-content;
}
.badge.on  { background: #1c3829; color: #a6e3a1; border: 1px solid #2a5c3f; }
.badge.off { background: #2e1f1f; color: #f38ba8; border: 1px solid #5c2828; }
.card button {
  margin-top: auto; padding: 7px 0; width: 100%;
  background: #313244; color: #cdd6f4;
  border: 1px solid #45475a; border-radius: 5px;
  font-size: 13px; cursor: pointer; transition: background .15s;
}
.card button:hover   { background: #45475a; }
.card button:active  { background: #585b70; }
.card.is-on { border-color: #2a5c3f; }

/* footer */
.footer {
  padding: 8px 24px; background: #1e1e2e; border-top: 1px solid #313244;
  font-size: 11px; color: #45475a;
}
</style>
</head><body>

<div class="topbar">
  <span id="dot"></span>
  <h1>&#x26A1; PicoPDU</h1>
  <span class="sub">Pico 2W &bull; UTC+7</span>
  <div id="loginBar">
    <input type="password" id="passInput" placeholder="Password" maxlength="32"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Login</button>
    <span id="loginErr"></span>
  </div>
  <span id="loggedAs" style="display:none">
    &#x1F513; Logged in
    <button id="logoutBtn" onclick="doLogout()">Logout</button>
  </span>
</div>

<div class="main">
  <div class="sensors">
    <div class="scard">
      <span class="ico">&#x1F321;&#xFE0F;</span>
      <div>
        <div class="slabel">Temperature</div>
        <div class="sval" id="sTemp">-- &deg;C</div>
      </div>
    </div>
    <div class="scard">
      <span class="ico">&#x1F4A7;</span>
      <div>
        <div class="slabel">Humidity</div>
        <div class="sval" id="sHum">-- %</div>
      </div>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="footer">Auto-refresh every 1s</div>

<script>
const SESSION_MS = 2 * 3600 * 1000;   /* 2 ชั่วโมง */

let st   = null;
let busy = false;
let tok  = '';

/* ---- auth helpers ---- */
function setLoggedIn(newTok) {
  tok = newTok;
  localStorage.setItem('tok',     tok);
  localStorage.setItem('tok_exp', Date.now() + SESSION_MS);
  document.getElementById('loginBar').style.display  = 'none';
  document.getElementById('loggedAs').style.display  = '';
  document.getElementById('grid').classList.remove('locked');
}

function setLoggedOut() {
  tok = '';
  localStorage.removeItem('tok');
  localStorage.removeItem('tok_exp');
  document.getElementById('loginBar').style.display  = '';
  document.getElementById('loggedAs').style.display  = 'none';
  document.getElementById('grid').classList.add('locked');
  document.getElementById('passInput').value = '';
  document.getElementById('loginErr').textContent    = '';
}

async function doLogin() {
  const pass = document.getElementById('passInput').value;
  if (!pass) return;
  document.getElementById('loginErr').textContent = '';
  try {
    const d = await (await fetch('/cgi/login?pass=' + encodeURIComponent(pass))).json();
    if (d.ok) { setLoggedIn(d.tok); }
    else      { document.getElementById('loginErr').textContent = 'Wrong password'; }
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Error';
  }
}

async function doLogout() {
  await fetch('/cgi/logout').catch(() => {});
  setLoggedOut();
}

/* ---- state ---- */
function render() {
  let h = '';
  for (let i = 0; i < 8; i++) {
    const on = st[i];
    h += '<div class="card' + (on ? ' is-on' : '') + '">'
       + '<span class="label">Channel</span>'
       + '<span class="chnum">' + (i + 1) + '</span>'
       + '<span class="badge ' + (on ? 'on' : 'off') + '">' + (on ? 'ON' : 'OFF') + '</span>'
       + '<button data-ch="' + (i + 1) + '">' + (on ? 'Turn OFF' : 'Turn ON') + '</button>'
       + '</div>';
  }
  document.getElementById('grid').innerHTML = h;
}

function applyData(d) {
  const changed = !st || d.ch.some((v, i) => v !== st[i]);
  st = d.ch;
  if (changed) render();
  document.getElementById('sTemp').innerHTML = d.temp.toFixed(1) + ' &deg;C';
  document.getElementById('sHum').textContent = d.hum.toFixed(0) + ' %';
  document.getElementById('dot').style.background = '#a6e3a1';
}

async function load() {
  if (busy) return;
  /* ตรวจ session หมดอายุ */
  if (tok && Date.now() > parseInt(localStorage.getItem('tok_exp') || '0')) {
    setLoggedOut();
    return;
  }
  try {
    applyData(await (await fetch('/api/state')).json());
  } catch(e) {
    document.getElementById('dot').style.background = '#f38ba8';
  }
}

async function tog(n) {
  if (busy || !tok) return;
  busy = true;
  st[n - 1] ^= 1;
  render();
  document.getElementById('dot').style.background = '#f9e2af';
  try {
    applyData(await (await fetch('/cgi/toggle?tok=' + tok + '&ch=' + n)).json());
  } catch(e) {
    st[n - 1] ^= 1;
    render();
    document.getElementById('dot').style.background = '#f38ba8';
  }
  busy = false;
}

document.getElementById('grid').addEventListener('click', function(e) {
  const btn = e.target.closest('button[data-ch]');
  if (btn) tog(parseInt(btn.dataset.ch));
});

/* ---- init: ตรวจ localStorage token ---- */
async function init() {
  document.getElementById('grid').classList.add('locked');
  const saved    = localStorage.getItem('tok');
  const savedExp = parseInt(localStorage.getItem('tok_exp') || '0');

  if (saved && Date.now() < savedExp) {
    /* ยังไม่หมดอายุ — verify กับ server ว่า token ยังใช้ได้ (Pico อาจ reboot) */
    try {
      const d = await (await fetch('/cgi/verify?tok=' + saved)).json();
      if (d.ok) { setLoggedIn(saved); }
      else      { setLoggedOut(); }
    } catch(e) { setLoggedOut(); }
  } else {
    setLoggedOut();
  }

  load();
  setInterval(load, 1000);
}

init();
</script>
</body></html>
